services:
  nginx:
    image: nginx:alpine
    container_name: agentlabs-nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentlabs-app
    restart: always
    expose:
      - "5000"
    environment:
      - DATABASE_URL=postgresql://agentlabs:agentlabs_pass@db:5432/agentlabs
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./client/public/uploads:/app/client/public/uploads
      - ./logs:/app/logs
      - ./plugins:/app/plugins
    env_file:
      - .env

  db:
    image: postgres:15-alpine
    container_name: agentlabs-db
    restart: always
    environment:
      - POSTGRES_USER=agentlabs
      - POSTGRES_PASSWORD=agentlabs_pass
      - POSTGRES_DB=agentlabs
    volumes:
      - agentlabs-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlabs -d agentlabs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentlabs-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agentlabs-db-data:
